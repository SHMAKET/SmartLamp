<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icons/favicon.svg" type="image/svg+xml">
    <title>SmartLamp</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&family=Google+Sans+Mono&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="main.css">
</head>
<body class="bg-background text-text min-h-screen flex flex-col items-center pt-10
            transition-colors duration-300 md:px-60 font-['Google_Sans',sans-serif]">

    <!-- Decorative blobs so backdrop-blur has texture to work with -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none" id="blobs">
        <div class="blob absolute w-[clamp(250px,30vw,700px)] h-[clamp(250px,30vw,700px)] rounded-full bg-primary/20 blur-[80px]"></div>
        <div class="blob absolute w-[clamp(250px,30vw,700px)] h-[clamp(250px,30vw,700px)] rounded-full bg-secondary/15 blur-[60px]"></div>        
        <div class="blob absolute w-[clamp(250px,30vw,700px)] h-[clamp(250px,30vw,700px)] rounded-full bg-accent/16 blur-[70px]"></div>
    </div>

    <!-- Sidebar nav -->
    <nav id="nav"
        class="fixed top-3 left-3 bottom-3 w-52 z-40
                bg-primary/10 backdrop-blur-md rounded-2xl
                flex flex-col py-6 gap-4
                -translate-x-56 md:translate-x-0 transition-transform duration-300">

        <div class="text-primary flex font-bold text-lg px-5 mt-5 md:mt-0">
            <img src="icons/favicon.svg" class="w-6 h-6 inline-flex my-auto mr-2 text-secondary"> <a class="my-auto">SmartLamp</a>
        </div>

        <ul class="flex flex-col px-3 gap-2">
            <div id="indicator" class="tab-indicator"></div>
            <li> <a href="#home" class="tab tab-active"> Home </a> </li>
            <li> <a href="#battery" class="tab"> Battery </a> </li>
            <li> <a href="#settings" class="tab"> Settings </a> </li>
        </ul>
    </nav>

    <!-- Overlay (mobile) -->
    <div id="navOverlay"
        class="fixed inset-0 z-30 md:hidden 
                bg-black/20 opacity-0 pointer-events-none 
                transition-all duration-200 ease-in-out">
    </div>

    <!-- Burger button (mobile only) -->
    <button id="burgerBtn"
            class="md:hidden fixed top-3 left-3 z-50
                    w-9 h-9 bg-primary rounded-lg
                    flex flex-col items-center justify-center gap-1.25
                    border-none cursor-pointer hover:scale-110 transition-transform duration-200"
            aria-label="Toggle menu">
        <span class="block w-4.5 h-0.5 bg-background rounded transition-transform duration-300"></span>
        <span class="block w-4.5 h-0.5 bg-background rounded transition-opacity duration-300"></span>
        <span class="block w-4.5 h-0.5 bg-background rounded transition-transform duration-300"></span>
    </button>

    <!-- Theme toggle button -->
    <button id="toggleTheme"
            class="fixed top-3 right-3 z-50
                    w-8 h-8 bg-primary rounded-lg
                    flex items-center justify-center
                    text-background cursor-pointer
                    hover:scale-110 transition-transform duration-200 border-none"
            aria-label="Toggle theme">
        <!-- Sun (dark mode) -->
        <svg class="icon-sun w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <!-- Moon (light mode) -->
        <svg class="icon-moon w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
    </button>

    <!-- Main content -->
    <main id="panels" class="gap-6 p-6 w-full">
<!-- =====HOME================================ -->
        <section id="home" class="panel w-full flex flex-col items-center justify-center">

            <div class="surface rounded-[15px] p-6 flex flex-col gap-6 md:w-3/5 w-full">

                <div class="relative z-20" id="cb">
                    <label class="block text-xs font-semibold mb-2 tracking-wider text-primary/80">
                        ✦ Effect
                    </label>
        <!-- Trigger -->
                    <button class="w-full flex items-center justify-between px-4 py-3 rounded-xl text-sm
                                    text-text border transition-all
                                    border-primary/20 bg-background/10 backdrop-blur-md
                                    hover:bg-primary/10 hover:border-primary/40">
                        <span id="btn-label" class="text-text/30 transition-colors">Select effect...</span>
                        <svg id="chevron" class="chevron w-4 h-4 text-primary/60 shrink-0"
                            fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </button>
        <!-- Dropdown -->
                    <div id="dropdown" class="dropdown absolute mt-2 w-full rounded-xl overflow-hidden 
                                            border border-primary/20 bg-background/60 backdrop-blur-2xl"
                        style="box-shadow: 0 20px 40px rgb(var(--background) / .4), 0 0 0 1px rgb(var(--primary) / .15)">
        <!-- Search -->
                        <div class="p-2.5 border-b border-primary/10">
                            <div class="flex items-center gap-2 rounded-lg px-3 py-2 transition-colors 
                                        bg-primary/5 border border-primary/10">
                                <svg class="w-3.5 h-3.5 text-primary/50 shrink-0"
                                    fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                                </svg>
                                <input
                                    id="search"
                                    placeholder="searching..."
                                    class="flex-1 bg-transparent text-sm outline-none min-w-0
                                        text-text placeholder-text/20"
                                />
                                <button id="clear-btn"
                                        class="text-text/20 hover:text-text/60 transition-colors hidden text-lg leading-none">
                                    ×
                                </button>
                            </div>
                        </div>
        <!-- List -->
                        <ul id="list" class="max-h-56 overflow-y-auto px-2 py-2"></ul>
        <!-- Footer -->
                        <div id="count"
                            class="mx-2 mb-2 px-3 py-1.5 rounded-lg text-center text-xs font-mono
                                    bg-primary/5 text-text/20">
                        </div>
                    </div>
                </div>

                <!-- Brightness -->
                <div>
                    <div class="flex items-center justify-between mb-3">
                        <label class="text-sm font-medium c-label">☀ Brightness</label>
                        <span id="br-chip" class="bg-chip c-primary font-['Google_Sans_Mono'] text-[11.5px] font-medium px-3 py-0.5 rounded-full min-w-17 text-center select-none"></span>
                    </div>
                    <div class="relative h-1">
                        <div class="bg-track w-full h-full rounded-full relative overflow-hidden">
                            <div id="br-fill" class="bg-primary absolute left-0 top-0 h-full rounded-full">
                            </div>
                        </div>
                            <input class="md-slider appearance-none absolute inset-x-0 -top-2.5 h-[calc(100%+20px)] w-full bg-transparent cursor-pointer z-10"
                                    type="range" id="br" min="0" max="255" value="0"/>
                    </div>
                    <div class="flex justify-between mt-1.5 text-[11px] font-['Google_Sans_Mono'] c-hint">
                        <span>0</span><span>255</span>
                    </div>
                </div>

                <div class="h-px divider"></div>

                <!-- Speed -->
                <div>
                    <div class="flex items-center justify-between mb-3">
                        <label class="text-sm font-medium c-label">⚡ Speed</label>
                        <span id="sp-chip" class="bg-chip c-primary font-['Google_Sans_Mono'] text-[11.5px] font-medium px-3 py-0.5 rounded-full min-w-17 text-center select-none"></span>
                    </div>
                    <div class="relative h-1">
                        <div class="bg-track w-full h-full rounded-full relative overflow-hidden">
                            <div id="sp-fill" class="bg-primary absolute left-0 top-0 h-full rounded-full"></div>
                        </div>
                        <input class="md-slider appearance-none absolute inset-x-0 -top-2.5 h-[calc(100%+20px)] w-full bg-transparent cursor-pointer z-10"
                            type="range" id="sp" min="0" max="255" value="0"/>
                    </div>
                    <div class="flex justify-between mt-1.5 text-[11px] font-['Google_Sans_Mono'] c-hint">
                        <span>0</span><span>255</span>
                    </div>
                </div>

                <div class="h-px divider"></div>

                <!-- K Factor -->
                <div>
                    <div class="flex items-center justify-between mb-3">
                        <label class="text-sm font-medium c-label">◈ K Factor</label>
                        <span id="kf-chip" class="bg-chip c-primary font-['Google_Sans_Mono'] text-[11.5px] font-medium px-3 py-0.5 rounded-full min-w-17 text-center select-none"></span>
                    </div>
                    <div class="relative h-1">
                        <div class="bg-track w-full h-full rounded-full relative">
                            <div id="kf-neg" class="bg-fill-neg absolute top-0 h-full rounded-full hidden"></div>
                            <div id="kf-pos" class="bg-primary  absolute top-0 h-full rounded-full hidden"></div>
                            <div class="center-tick absolute top-1/2 -translate-x-1/2 -translate-y-1/2 w-0.5 h-2.5 rounded-sm bg-primary opacity-40"></div>
                        </div>
                        <input class="md-slider appearance-none absolute inset-x-0 -top-2.5 h-[calc(100%+20px)] w-full bg-transparent cursor-pointer z-10"
                            type="range" id="kf" min="-128" max="127" value="0"/>
                    </div>
                    <div class="flex justify-between mt-1.5 text-[11px] font-['Google_Sans_Mono'] c-hint">
                        <span>-128</span><span>0</span><span>+127</span>
                    </div>
                </div>

                <p id="hex-row" class="text-center mt-2.5 text-[11.5px] font-['Google_Sans_Mono'] c-muted">
                    0x00 · 0x00 · +0x00
                </p>

                <div class="flex justify-center gap-3">
                    <button id="dbtn" class="btn btn-primary btn-pill mx-auto">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"> <polyline points="20 6 9 17 4 12"/> </svg>
                        Default
                    </button>
                    <button id="rbtn" class="btn btn-primary btn-pill mx-auto">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"> <polyline points="16 3 21 3 21 8"/> <line x1="4" y1="20" x2="21" y2="3"/> <polyline points="21 16 21 21 16 21"/> <line x1="15" y1="15" x2="21" y2="21"/> </svg>
                        Random
                    </button>
                </div>

            </div>
            
        </section>
<!-- =====HOME================================ -->
<!-- =====BATTERY============================= -->
        <section id="battery" class="panel w-full flex-col items-center justify-center hidden">
            <div>
                <div>
                    <span>Voltage</span> <span data-key="voltage_V">—</span> <span>V</span>
                </div>
                <div>
                    <span>SOC</span> <span data-key="soc_pct">—</span> <span>%</span>
                </div>
                <div>
                    <span>Current</span> <span data-key="current_mA">—</span> <span>mA</span>
                </div>
                <div>
                    <span>Power</span> <span data-key="power_mW">—</span> <span>mW</span>
                </div>
                <div>
                    <span>Bus V</span> <span data-key="bus_V">—</span> <span>V</span>
                </div>
                <div>
                    <span>Shunt</span> <span data-key="shunt_mV">—</span><span>mV</span>
                </div>
            </div>
        </section>
<!-- =====BATTERY============================= -->
        <section id="settings" class="panel w-full flex-col items-center justify-center hidden">
            <a id="counter">0</a>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
